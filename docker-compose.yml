version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: java-dp-postgres
    environment:
      POSTGRES_DB: TON_DB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
